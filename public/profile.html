<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segnitz Rental - Mein Bereich</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/fonts.css">
</head>

<body>

    <div id="globalAlertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3"
        style="z-index: 3000; width: 90%; max-width: 520px;"></div>

    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-3 col-xl-2 bg-primary text-white p-4">
                <h2>Segnitz Rental</h2>
                <h5 class="mt-3">Mein Bereich</h5>
                <h6>Kundenkonto</h6>

                <nav class="nav flex-column mt-4">
                    <button class="btn btn-outline-light text-start mb-2 active" id="nav-profile"
                        onclick="switchProfileView('profile')">
                        <i class="bi bi-person-vcard"></i>
                        Meine Daten
                    </button>

                    <button class="btn btn-outline-light text-start mb-2" id="nav-orders"
                        onclick="switchProfileView('orders')">
                        <i class="bi bi-receipt"></i>
                        Meine Bestellungen
                    </button>
                </nav>

                <a href="/index.html">
                    <button class="btn btn-light w-100 mt-4">
                        <i class="bi bi-arrow-left-circle"></i>
                        Persönlichen Bereich verlassen
                    </button>
                </a>

                <button class="btn btn-danger w-100 mt-2" onclick="logout()">
                    <i class="bi bi-x-circle"></i>
                    Abmelden
                </button>
            </aside>

            <!-- CONTENT -->
            <main class="col-12 col-md-9 col-xl-10 p-4 p-lg-5">
                <div id="qbox-container_form">

                    <!-- MEINE DATEN -->
                    <div id="profileView">
                        <h4 class="mb-4">Meine Daten</h4>

                        <div id="profileError" class="alert alert-danger d-none"></div>

                        <div id="profileBox" class="card d-none">
                            <div class="card-body">

                                <form id="profileForm">
                                    <div class="row g-3">
                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Kundennummer</label>
                                            <input type="text" id="customerNo" class="form-control" readonly>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">E-Mail</label>
                                            <input type="email" id="email" class="form-control" readonly>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Vorname</label>
                                            <input type="text" id="profileFirstName" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Nachname</label>
                                            <input type="text" id="profileLastName" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Telefon</label>
                                            <input type="text" id="profilePhone" class="form-control" required>
                                        </div>

                                        <div class="col-12">
                                            <label class="form-label">Adresse</label>
                                            <input type="text" id="profileAddress" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-4">
                                            <label class="form-label">PLZ</label>
                                            <input type="text" id="profileZip" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-8">
                                            <label class="form-label">Ort</label>
                                            <input type="text" id="profileCity" class="form-control" required>
                                        </div>

                                        <div class="col-12">
                                            <label class="form-label">E-Mail bestätigt</label>
                                            <input type="text" id="verified" class="form-control" readonly>
                                        </div>

                                        <div class="col-12">
                                            <button type="submit" class="btn btn-success">
                                                Daten speichern
                                            </button>
                                        </div>
                                    </div>
                                </form>

                                <hr class="my-4">

                                <h5>Passwort ändern</h5>

                                <form id="passwordForm">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <label class="form-label">Aktuelles Passwort</label>
                                            <input type="password" id="currentPassword" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Neues Passwort</label>
                                            <input type="password" id="newPassword" class="form-control" required>
                                        </div>

                                        <div class="col-12 col-lg-6">
                                            <label class="form-label">Neues Passwort wiederholen</label>
                                            <input type="password" id="newPasswordConfirm" class="form-control"
                                                required>
                                        </div>

                                        <div class="col-12">
                                            <button type="submit" class="btn btn-warning">
                                                Passwort ändern
                                            </button>
                                        </div>
                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>

                    <!-- BESTELLUNGEN -->
                    <div id="ordersView" class="d-none">
                        <h4 class="mb-4">Meine Bestellungen</h4>

                        <div id="myOrdersList">
                            <div class="alert alert-info">Bestellungen werden geladen...</div>
                        </div>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="myOrderDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Bestelldetails</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="myOrderDetailsBody"></div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Schließen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/alerts.js"></script>
    <script src="js/profile_config.js"></script>

</body>

</html>
