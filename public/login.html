<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segnitz Rental </title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/tempus-dominus.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link rel="stylesheet" href="css/fonts.css">
    <!--FAVICON-->
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link rel="mask-icon" href="img/safari-pinned-tab.svg" color="#ffffff">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">

</head>

<body>
    <div id="globalAlertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3"
        style="z-index: 3000; width: 90%; max-width: 520px;">
    </div>
    <!-- CONTAINER -->
    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">

            <aside class="col-12 col-md-3 col-xl-2 bg-primary text-white p-4">
                <h2>Segnitz Rental</h2>
                <h5 class="mt-3">Anmeldung</h5>

                <p class="mt-4 mb-1">Adressdaten</p>
                <a class="text-white" href="mailto:info@segnitzbau.de">info@segnitzbau.de</a>

                <a href="/index.html">
                    <button type="button" class="btn btn-light w-100 mt-4">
                        <i class="bi bi-arrow-left-circle"></i>
                        Zurück zur Startseite
                    </button>
                </a>
            </aside>

            <main class="col-12 col-md-9 col-xl-10 p-4 p-lg-5">
                <div id="qbox-container_form" class="w-100">
                    <form class="needs-validation" id="loginForm" method="post" name="loginForm">

                        <div id="steps-container">
                            <div class="step d-block">
                                <div id="login" class="mx-auto" style="max-width: 480px;">
                                    <h4 class="mb-4">Einloggen</h4>

                                    <input type="text" class="form-control" id="username"
                                        placeholder="Benutzername eingeben">

                                    <br>

                                    <input type="password" class="form-control" id="password"
                                        placeholder="Passwort eingeben">

                                    <br>

                                    <button type="submit" class="btn btn-primary w-100">
                                        Einloggen
                                    </button>
                                    <p class="mt-2 text-center">
                                        <a href="#" id="forgotPasswordLink">Passwort vergessen?</a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </main>

        </div>
    </div>
    <div id="preloader-wrapper">
        <div id="preloader"></div>
        <div class="preloader-section section-left"></div>
        <div class="preloader-section section-right"></div>
    </div>

    <div class="modal fade" id="passwordResetModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Passwort zurücksetzen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="passwordResetRequestForm">
                        <label class="form-label">E-Mail-Adresse</label>
                        <input type="email" id="resetEmail" class="form-control" required>

                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            Reset-Link anfordern
                        </button>
                    </form>

                    <form id="passwordResetForm" class="d-none mt-3">
                        <input type="hidden" id="resetToken">

                        <label class="form-label">Neues Passwort</label>
                        <input type="password" id="resetNewPassword" class="form-control" required>

                        <label class="form-label mt-2">Neues Passwort wiederholen</label>
                        <input type="password" id="resetNewPasswordConfirm" class="form-control" required>

                        <button type="submit" class="btn btn-success w-100 mt-3">
                            Passwort speichern
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!--Bootstrap-->
    <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
    <!-- Javascript to handle Alerts -->
    <script type="text/javascript" src="js/alerts.js"></script>
    <!--General Functionalities-->
    <script type="text/javascript" src="js/login_config.js"></script>

</body>

</html>
