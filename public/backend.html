<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nather - Backend</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/tempus-dominus.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link rel="stylesheet" href="css/fonts.css">
    <style>
        .btn-primary:hover {
            background-color: #0d6efd; /* Dies ist die Standardfarbe von Bootstrap für btn-primary */
            border-color: #0d6efd; /* Passen Sie diese Werte entsprechend Ihrer spezifischen Farbeinstellung an */
        }
    </style>
</head>
<body>
    Nather Heizung Sanitär Backend
    <!-- CONTAINER -->
    <div class="container d-flex align-items-center min-vh-100">
        <div class="row g-0 justify-content-center">
            <!-- TITLE -->
            <div class="col-xs-5 col-lg-5">
                <div id="title-container">
                    <h2>NATHER</h2>
                    <h2>Heizung - Sanitär</h2>
                    <br>
                    <h3>Konfiguration</h3>
                    <br>
                    <p>Fachbetrieb der Innung Sanitär- und Heizungstechnik</p>
                    <p>Zwergerstraße 2b<br>
                        85579 Neubiberg<br>
                        <a href="tel:+498960190411">Tel.:089 601 904 11</a><br>
                        <a href="mailto:info@nather-hs.de">E-Mail:info@nather-hs.de</a>
                    </p>
                    <br>
                    Logout
                </div>
            </div>
            <!-- FORMS -->
            <div class="col-xs-7 col-lg-7">
                <div id="qbox-container_form">
                    <form class="needs-validation" id="form-wrapper" method="post" name="form-wrapper" novalidate="">
                        <div id="steps-container">
                            <div class="step d-block">
                                <h4>Auswählen welche Datenbank bearbeitet werden soll: </h4>
                                <div class="row">
                                    <select name="DBType" id="DBType" class="form-select">
                                        <option selected disabled hidden>Datenbank auswählen...</option>
                                        <option value="material">Material</option>
                                        <option value="monteure">Monteure</option>
                                    </select>
                                </div>
                                <div>
                                    <h4>Verfügbare Optionen:</h4>
                                    <div id="selectedOptionsContainer"></div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="preloader-wrapper">
        <div id="preloader"></div>
        <div class="preloader-section section-left"></div>
        <div class="preloader-section section-right"></div>
    </div>
    <!-- Static App Form Collection Script -->
    <script type="text/javascript" src="js/static-forms.js"></script>
    <!--Popper-->
    <script type="text/javascript" src="js/popper.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
 
    <!-- JavaScript to populate dropdown options -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    var select = document.getElementById("DBType");
    var selectedOptionsContainer = document.getElementById("selectedOptionsContainer");

    function updateSelectedOptions(selectedValue) {
        selectedOptionsContainer.innerHTML = ''; // Clear previous options

        if (selectedValue === "material") {
            fetch('/materials')
            .then(response => response.json())
            .then(materialData => {
                materialData.forEach(material => {
                    var buttonGroup = createButtonGroup(material);
                    selectedOptionsContainer.appendChild(buttonGroup);
                    selectedOptionsContainer.appendChild(document.createElement('br')); // Fügt einen Zeilenumbruch nach jeder Button-Group hinzu
                });
            })
            .catch(error => {
                console.error('Fehler beim Abrufen der Materialdaten:', error);
                selectedOptionsContainer.textContent = 'Fehler beim Abrufen der Materialdaten';
            });
        } else if (selectedValue === "monteure") {
            fetch('/workers')
            .then(response => response.json())
            .then(workData => {
                workData.forEach(worker => {
                    var buttonGroup = createButtonGroup(worker);
                    selectedOptionsContainer.appendChild(buttonGroup);
                    selectedOptionsContainer.appendChild(document.createElement('br')); // Fügt einen Zeilenumbruch nach jeder Button-Group hinzu
                });
            })
            .catch(error => {
                console.error('Fehler beim Abrufen der Monteurdaten:', error);
                selectedOptionsContainer.textContent = 'Fehler beim Abrufen der Monteurdaten';
            });
        }
    }

    function createButtonGroup(item) {
        var div = document.createElement('div');
        div.className = 'btn-group d-flex';
        div.style.width = '100%'; // Setzt die Breite der Button-Group auf 100%

        var button = document.createElement('button');
        button.className = 'btn btn-primary';
        button.style.width = '75%'; // Setzt die Breite des Hauptbuttons auf 75%
        button.textContent = item;

        var deleteButton = document.createElement('button');
        deleteButton.className = 'btn btn-danger';
        deleteButton.style.width = '25%'; // Setzt die Breite des Löschbuttons auf 25%
        deleteButton.textContent = 'Löschen';
        deleteButton.addEventListener('click', function(event) {
            event.preventDefault();
            deleteItem(item);
        });

        div.appendChild(button);
        div.appendChild(deleteButton);

        return div;
    }

    function deleteItem(item) {
        var selectedValue = select.value;
        var endpoint = selectedValue === 'material' ? '/delete-material' : '/delete-worker';
        fetch(endpoint, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name: item })
        })
        .then(response => {
            if (response.ok) {
                alert('Eintrag erfolgreich gelöscht');
                updateSelectedOptions(selectedValue); // Refresh the options
            } else {
                alert('Fehler beim Löschen des Eintrags');
            }
        })
        .catch(error => {
            console.error('Fehler beim Löschen des Eintrags:', error);
            alert('Fehler beim Löschen des Eintrags');
        });
    }

    updateSelectedOptions(select.value);
    select.addEventListener('change', function() {
        updateSelectedOptions(this.value);
    });
});

    </script>
</body>
</html>
