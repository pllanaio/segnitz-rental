<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segnitz Rental - Backend</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/tempus-dominus.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
    <!-- FONT -->
    <link rel="stylesheet" href="css/fonts.css">
    <!--FAVICON-->
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
    <link rel="mask-icon" href="img/safari-pinned-tab.svg" color="#ffffff">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <style>
        .btn-primary:hover {
            background-color: #0d6efd;
            /* Dies ist die Standardfarbe von Bootstrap für btn-primary */
            border-color: #0d6efd;
            /* Passen Sie diese Werte entsprechend Ihrer spezifischen Farbeinstellung an */
        }
    </style>
</head>

<body>
    <!-- CONTAINER -->
    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">

            <aside class="col-12 col-md-3 col-xl-2 bg-primary text-white p-4">
                <h2>Segnitz Rental</h2>
                <h5 class="mt-3">Backend</h5>
                <h6>Konfiguration</h6>

                <p id="backend-login-status" class="mt-4 small"></p>

                <p class="mt-4 mb-1">Zwergerstraße 2b<br>85579 Neubiberg</p>
                <a class="text-white" href="mailto:info@segnitzbau.de">info@segnitzbau.de</a>

                <a href="/index.html">
                    <button type="button" class="btn btn-light w-100 mt-4">
                        <i class="bi bi-arrow-left-circle"></i>
                        Konfiguration beenden
                    </button>
                </a>

                <a href="#">
                    <button type="button" class="btn btn-danger w-100 mt-2" onclick="logout()">
                        <i class="bi bi-x-circle"></i>
                        Abmelden
                    </button>
                </a>
            </aside>
            <main class="col-12 col-md-9 col-xl-10 p-4 p-lg-5">
                <div id="qbox-container_form" class="w-100">
                    <h4 class="mb-4">Produkte verwalten</h4>

                    <div id="productMessage" class="alert d-none"></div>

                    <form id="productForm" class="mb-5">
                        <input type="hidden" id="productId">

                        <div class="row g-3">
                            <div class="col-12 col-lg-4">
                                <label class="form-label" for="productKey">Produkt-Key</label>
                                <input type="text" class="form-control" id="productKey" placeholder="z.B. bautrockner">
                            </div>

                            <div class="col-12 col-lg-8">
                                <label class="form-label" for="title">Titel</label>
                                <input type="text" class="form-control" id="title" placeholder="z.B. Bautrockner">
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="description">Beschreibung</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>

                            <div class="col-12 col-lg-4">
                                <label class="form-label" for="pricePerDay">Preis pro Tag</label>
                                <input type="number" step="0.01" min="0" max="999999.99" class="form-control"
                                    id="pricePerDay">
                            </div>

                            <div class="col-12 col-lg-4">
                                <label class="form-label" for="deposit">Kaution</label>
                                <input type="number" step="0.01" min="0" max="999999.99" class="form-control"
                                    id="deposit">
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="productImages">Produktbilder</label>
                                <input type="file" class="form-control" id="productImages" accept="image/*" multiple>
                                <small class="text-muted">Maximal 10 Bilder pro Produkt.</small>
                            </div>

                            <div class="col-12 d-none" id="existingImagesWrapper">
                                <label class="form-label">Vorhandene Bilder</label>
                                <div id="existingImages" class="row g-2"></div>
                            </div>

                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="isActive" checked>
                                    <label class="form-check-label" for="isActive">Produkt aktiv</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-success" id="saveProductBtn">
                                    Produkt speichern
                                </button>
                                <button type="button" class="btn btn-secondary d-none" id="cancelEditBtn">
                                    Bearbeiten abbrechen
                                </button>
                            </div>
                        </div>
                    </form>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Vorhandene Produkte</h5>

                        <input type="search" id="backendProductSearchInput" class="form-control w-auto"
                            placeholder="Produkt suchen...">
                    </div>
                    <div id="productList"></div>
                </div>
            </main>
        </div>
    </div>
    <div id="preloader-wrapper">
        <div id="preloader"></div>
        <div class="preloader-section section-left"></div>
        <div class="preloader-section section-right"></div>
    </div>
    <!--Bootstrap-->
    <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
    <!-- Static App Form Collection Script -->
    <script type="text/javascript" src="js/static-forms.js"></script>
    <!--Popper-->
    <script type="text/javascript" src="js/popper.min.js"></script>
    <!-- JavaScript to populate dropdown options -->
    <script type="text/javascript" src="js/backend_config.js"></script>
</body>

</html>
