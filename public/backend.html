<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Segnitz Rental - Backend</title>
        <!-- CSS -->
        <link rel="stylesheet" href="css/tempus-dominus.min.css">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/style.css">
        <link
            rel="stylesheet"
            href="css/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css">
        <!-- FONT -->
        <link rel="stylesheet" href="css/fonts.css">
        <!--FAVICON-->
        <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
        <link rel="manifest" href="img/site.webmanifest">
        <link rel="mask-icon" href="img/safari-pinned-tab.svg" color="#ffffff">
        <meta name="msapplication-TileColor" content="#ffffff">
        <meta name="theme-color" content="#ffffff">
        <style>
            .btn-primary:hover {
                background-color: #0d6efd;
                /* Dies ist die Standardfarbe von Bootstrap für btn-primary */
                border-color: #0d6efd;
                /* Passen Sie diese Werte entsprechend Ihrer spezifischen Farbeinstellung an */
            }
        </style>
    </head>
    <body>
        <!-- CONTAINER -->
        <div class="container d-flex align-items-center min-vh-100">
            <div class="row g-0 justify-content-center">
                <!-- TITLE -->
                <div class="col-12 col-lg-5">
                    <!-- Ändern zu col-12 col-lg-5 für bessere Responsivität -->
                    <div id="title-container">
                        <h2>Segnitz Rental</h2>
                        <h2>Backend</h2>
                        <br>
                        <h3>Konfiguration</h3>
                        <br>
                        <p>Fachbetrieb der Innung Sanitär- und Heizungstechnik</p>
                        <p>Zwergerstraße 2b<br>
                            85579 Neubiberg<br>
                            <a href="">Tel.:</a><br>
                            <a href="mailto:info@segnitzbau.de">E-Mail:info@segnitzbau.de</a>
                        </p>
                        <br>
                        <a href="index.html">
                            <button type="button" class="btn btn-secondary">
                                <i class="bi bi-gear"></i>
                                Konfiguration beenden
                            </button>
                        </a>
                        <a href="">
                            <button type="button" class="btn btn-danger" onclick="logout()">
                                <i class="bi bi-x-circle"></i>
                                Abmelden
                            </button>
                        </a>
                    </div>
                </div>
                <!-- FORMS -->
                <div class="col-12 col-lg-7">
                    <!-- Ändern zu col-12 col-lg-7 für bessere Responsivität -->
                    <div id="qbox-container_form">
                        <form
                            class="needs-validation"
                            id="form-wrapper"
                            method="post"
                            name="form-wrapper"
                            novalidate=""
                            onsubmit="event.preventDefault();">
                            <div id="steps-container">
                                <div class="step d-block">
                                    <div class="row">
                                        <h4>Auswählen welche Datenbank bearbeitet werden soll:
                                        </h4>
                                        <select name="DBType" id="DBType" class="form-select col-12">
                                            <option selected="selected" disabled="disabled" hidden="hidden">Datenbank auswählen...</option>
                                            <option value="material">Material</option>
                                            <option value="monteure">Monteure</option>
                                        </select>
                                    </div>
                                    <br>
                                    <div id="inputGroup" style="display: none;" class="input-group col-12">
                                        <input
                                            type="text"
                                            id="db_edit"
                                            class="form-control"
                                            placeholder="Neuen Eintrag hinzufügen"
                                            aria-label="Neuen Eintrag hinzufügen">
                                        <button class="btn btn-success" type="button" id="addButton">Hinzufügen</button>
                                    </div>
                                    <br>
                                    <h4>Verfügbare Optionen:
                                        <span id="itemCount">0</span></h4>
                                    <div id="selectedOptionsContainer"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div id="preloader-wrapper">
            <div id="preloader"></div>
            <div class="preloader-section section-left"></div>
            <div class="preloader-section section-right"></div>
        </div>
        <!--Bootstrap-->
        <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
        <!-- Static App Form Collection Script -->
        <script type="text/javascript" src="js/static-forms.js"></script>
        <!--Popper-->
        <script type="text/javascript" src="js/popper.min.js"></script>
        <!-- JavaScript to populate dropdown options -->
        <script type="text/javascript" src="js/backend_config.js"></script>
    </body>
</html>
