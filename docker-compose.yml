version: '3.8'

services:
  nather:
    image: ascvisiondocker/apollo_order_manager:latest
    container_name: apollo_order_manager
    hostname: apollo_order_manager
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - mysql

  mysql:
    image: mysql:latest
    container_name: mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: MldeSf8536!
    ports:
      - "3306:3306"
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    hostname: phpmyadmin
    environment:
      PMA_HOST: mysql
    ports:
      - "3001:80"
    restart: always
    depends_on:
      - mysql

volumes:
  mysql_data: